<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - Reynaldo Dendy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="tes1.css">
    <style>
        .header-gradient {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent);
        }
    </style>
</head>

<body class="bg-black text-white font-sans overflow-x-hidden">

    <div class="fixed top-0 left-0 w-full z-50 header-gradient text-white">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">
                <img class="size-8 md:size-11" src="assets/Logo.png" alt="Logo">
            </h1>
            <div class="flex gap-3 text-[10px] md:text-sm items-center">
                <a href="index.html" class="hover:text-yellow-400 duration-300">Home</a>
                <a href="galerry.html" class="hover:text-yellow-400 duration-300">Gallery</a>
                <a href="hobby.html" class="hover:text-yellow-400 duration-300">Hobbies</a>
                <a href="contact.html"
                    class="border border-white px-2 hover:bg-white hover:text-black duration-300">Contact Me</a>
            </div>
        </div>
    </div>

    <main
        class="min-h-[80vh] bg-gradient-to-b from-[#816f31] via-[#816f31] to-black flex items-center justify-center pt-24 pb-6 px-4">

        <div
            class="max-w-4xl w-full bg-white rounded-[1.5rem] md:rounded-[2rem] overflow-hidden shadow-2xl flex flex-col md:flex-row min-h-[250px] md:min-h-[400px]">

            <div class="w-full md:w-1/2 p-4 md:p-12 text-gray-800">
                <h2 class="text-2xl md:text-4xl font-bold mb-4 text-gray-900 tracking-tight">Contact us</h2>

                <form id="whatsappForm" class="space-y-2 md:space-y-4">
                    <div class="relative">
                        <input type="text" id="name" placeholder="Name" required
                            class="w-full px-3 py-2 bg-yellow-100/50 border-none rounded-xl focus:ring-2 focus:ring-[#816f31] outline-none transition-all text-sm">
                    </div>

                    <div class="relative">
                        <input type="email" id="email" placeholder="Email" required
                            class="w-full px-3 py-2 bg-yellow-100/50 border-none rounded-xl focus:ring-2 focus:ring-[#816f31] outline-none transition-all text-sm">
                    </div>

                    <div class="relative">
                        <textarea id="message" placeholder="Message" rows="4" required
                            class="w-full p-3 bg-yellow-100/50 border-none rounded-xl focus:ring-2 focus:ring-[#816f31] outline-none transition-all text-sm"></textarea>
                    </div>

                    <button type="submit"
                        class="w-full md:w-auto px-6 py-2 bg-zinc-900 hover:bg-[#816f31] text-white font-bold rounded-full transition-all duration-300 shadow-md active:scale-95 text-sm uppercase tracking-widest">
                        Send Message
                    </button>
                </form>
            </div>

            <div class="hidden md:flex w-1/2 bg-[#816f31]/10 relative items-center justify-center overflow-hidden">
                <img class="w-full h-full object-cover p-3 rounded-[2.5rem]" src="assets/contact.jpg"
                    alt="Contact Image">
            </div>
        </div>
    </main>

    <div class="bg-zinc-900 border-t border-white/10 py-8">
        <div class="max-w-6xl mx-auto px-6 text-center">
            <div class="flex justify-center mb-4">
                <img class="size-9 md:size-11" src="assets/Logo.png" alt="Logo">
            </div>
            <p class="text-gray-400 text-[10px] md:text-sm">Our Phone +62 0896 7561 9870</p>
            <p class="text-gray-400 mt-1 text-[10px] md:text-sm max-w-[250px] md:max-w-none mx-auto">
                CitraLand CBD Boulevard, Made, Surabaya – Indonesia
            </p>
            <div class="w-full h-[1px] bg-white/10 my-6"></div>
            <p class="text-[9px] md:text-xs text-gray-500 uppercase">
                Copyright © 2026 - Reynaldo Dendy All rights reserved.
            </p>
        </div>
    </div>

    <script src="contact.js"></script>

</body>

</html>
